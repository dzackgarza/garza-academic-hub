<div class="academic-site-shell">
  <nav class="academic-site-nav" aria-label="Main navigation">
    <a class="academic-site-brand" href="$site.base$/">$site.profile.name$</a>
    <div class="academic-site-nav-links">
      $for(site.nav)$
      <a href="$site.nav.path$">$site.nav.label$</a>
      $endfor$
    </div>
  </nav>

  <main class="post-layout-grid">
    <article class="post-content prose dark:prose-invert max-w-none">
      $if(title)$
      <header class="post-header">
        <h1>$title$</h1>
        $if(date)$<p class="post-date">$date$</p>$endif$
        $if(tags)$
        <ul class="post-tags">
          $for(tags)$<li>$tags$</li>$endfor$
        </ul>
        $endif$
      </header>
      $endif$

      $body$
    </article>

    $if(toc)$
    <aside class="post-sidebar">
      <div class="toc-card">
        <h3 class="toc-title">Table of Contents</h3>
        $toc$
      </div>
    </aside>
    $endif$
  </main>

  <footer class="academic-site-footer">
    <p>$site.profile.name$</p>
  </footer>
</div>
